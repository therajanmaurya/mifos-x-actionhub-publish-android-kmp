# .github/workflows/release.yaml
#
# Reusable workflow for the Android PLAY STORE promotion ladder (internal → beta → production).
# Firebase App Distribution is a SEPARATE workflow — release-firebase.yaml — since the
# 2026-06-22 split (firebase ∥ play, epic multi-platform-release-completion D2). This file
# no longer contains any Firebase job, so the Play invocation renders a CLEAN graph with no
# skipped Firebase node.
#
# Modes (since v2.0.10):
#   standard          — original behavior: caller passes android secrets as
#                       secrets:, action materializes + invokes lane with options
#                       (root-level fastlane/Fastfile with `platform :android`).
#   pre-materialized  — caller has the consumer's deployment/-layout per
#                       RULE-DEPLOYMENT-MANIFEST-001. Wrapper runs the
#                       consumer-provided `pre_fastlane_script` BEFORE the
#                       composite action, then invokes the composite action with
#                       `mode: pre-materialized` so it CDs to `fastlane_cwd` and
#                       runs the lane without option overrides.
#
# Promotion model (Play only — Firebase lives in release-firebase.yaml):
#   Stage 1 (internal)    — Play Internal track, 1 reviewer required
#   Stage 2 (beta)        — Play Open Beta, 1 reviewer required (promote, no rebuild)
#   Stage 3 (production)  — Play Production, 1 reviewer required (promote, no rebuild)
name: Release · Android (Play ladder)
run-name: "🤖 Release Android ${{ inputs.version_tag }} · Play→${{ inputs.starting_rung }}"

on:
  workflow_call:
    inputs:
      android_package_name:
        description: 'Android Gradle module (e.g. cmp-android)'
        required: true
        type: string
      version_tag:
        description: 'Version tag (e.g. v2026.06.15)'
        required: true
        type: string
      starting_rung:
        description: "Resume from a specific rung: firebase | internal | beta | production"
        required: false
        type: string
        default: 'firebase'
      tester_groups:
        description: 'Firebase tester groups (comma-separated, Stage 0 only)'
        required: false
        type: string
        default: 'qa-team,beta-testers'
      production_rollout:
        description: 'Stage 3 staged rollout percentage (0.0-1.0)'
        required: false
        type: string
        default: '0.10'
      mode:
        description: "'standard' (default) or 'pre-materialized'"
        required: false
        type: string
        default: 'standard'
      fastlane_cwd:
        description: 'Working dir for fastlane (default `.`; set to `deployment` for RULE-DEPLOYMENT-MANIFEST-001 layout)'
        required: false
        type: string
        default: '.'
      pre_fastlane_script:
        description: 'Optional bash to run after checkout, before composite action (used in pre-materialized mode for consumer secrets-pull etc.)'
        required: false
        type: string
        default: ''
      runner_pool:
        description: 'JSON array of runner labels for runs-on. Default `["ubuntu-latest"]` (hosted). Pass `["self-hosted","macOS"]` to dispatch on a local self-hosted runner.'
        required: false
        type: string
        default: '["ubuntu-latest"]'

    secrets:
      google_services:          { required: false }
      firebase_creds:           { required: false }
      playstore_creds:          { required: false }
      upload_keystore:          { required: false }
      keystore_password:        { required: false }
      keystore_alias:           { required: false }
      keystore_alias_password:  { required: false }
      # Firebase App Distribution app ids — Firebase moved to release-firebase.yaml in the
      # 2026-06-22 split, so these are UNUSED here. Kept DECLARED only so the orchestrator's
      # explicit cross-org forwarding never hits an "undeclared secret" error if it still
      # passes them (secrets: inherit does not cross org boundaries — mifos-x 2026-06-21 fix).
      firebase_android_app_id:      { required: false }
      firebase_android_demo_app_id: { required: false }
      SOPS_AGE_KEY:             { required: false }

concurrency:
  # per-rung group — firebase (APK side-channel) and internal/beta/production (Play AAB) are
  # INDEPENDENT; a shared group made `firebase+internal` cancel itself. (epic finding 2026-06-22)
  group: release-android-${{ inputs.starting_rung }}
  cancel-in-progress: true

jobs:
  # Preflight: validate required secrets per rung (standard mode only — in
  # pre-materialized mode the consumer manages secrets via pre_fastlane_script).
  validate-secrets:
    name: Preflight · Validate required secrets
    # Runs in BOTH standard and pre-materialized modes — the secrets it checks are forwarded
    # explicitly at every hop regardless of mode, so secret verification is NEVER skipped.
    # (user mandate 2026-06-22 "always verify secrets, never skip"; was: if mode == 'standard')
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    steps:
      - name: Check android secrets per rung
        env:
          google_services:         ${{ secrets.google_services }}
          firebase_creds:          ${{ secrets.firebase_creds }}
          playstore_creds:         ${{ secrets.playstore_creds }}
          upload_keystore:         ${{ secrets.upload_keystore }}
          keystore_password:       ${{ secrets.keystore_password }}
          keystore_alias:          ${{ secrets.keystore_alias }}
          keystore_alias_password: ${{ secrets.keystore_alias_password }}
        run: |
          MISSING=()
          [[ -z "${google_services:-}" ]]         && MISSING+=("google_services")
          [[ -z "${upload_keystore:-}" ]]         && MISSING+=("upload_keystore")
          [[ -z "${keystore_password:-}" ]]       && MISSING+=("keystore_password")
          [[ -z "${keystore_alias:-}" ]]          && MISSING+=("keystore_alias")
          [[ -z "${keystore_alias_password:-}" ]] && MISSING+=("keystore_alias_password")
          [[ "${{ inputs.starting_rung }}" =~ ^(internal|beta|production)$ ]] && [[ -z "${playstore_creds:-}" ]] && MISSING+=("playstore_creds")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Android ladder→${{ inputs.starting_rung }} requires these secrets, but they are MISSING:"
            printf '   - %s\n' "${MISSING[@]}"
            echo ""
            echo "Set them in your repo's Settings → Secrets and variables → Actions:"
            for s in "${MISSING[@]}"; do echo "   gh secret set $s --repo \${{ github.repository }}"; done
            exit 1
          fi
          echo "✅ Android secrets present"

  # Store-listing preflight — CI mirror of /release STEP 1.7. Lives HERE in the reusable
  # workflow (not in each consumer) so EVERY consumer inherits it. Validates the Play Store
  # listing metadata is present + within char limits BEFORE the gated build runs, so the Play
  # API never rejects "missing required field: title". (2026-06-22)
  validate-store-listing:
    name: Preflight · Store Listing
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    steps:
      - uses: actions/checkout@v4
      - name: Pre-fastlane setup (consumer-provided, pre-materialized mode)
        if: ${{ inputs.mode == 'pre-materialized' && inputs.pre_fastlane_script != '' }}
        shell: bash
        run: ${{ inputs.pre_fastlane_script }}
      - name: Validate Play Store listing metadata
        shell: bash
        run: |
          # Resolve metadata dir — deployment-tree (RULE-DEPLOYMENT-MANIFEST) first, then legacy.
          DIR=""
          for D in deployment/android/metadata/en-US fastlane/metadata/android/en-US; do
            [ -d "$D" ] && DIR="$D" && break
          done
          if [ -z "$DIR" ]; then
            echo "❌ No Play Store listing metadata (deployment/android/metadata/en-US or fastlane/metadata/android/en-US)."
            echo "   The Play API rejects uploads without title/description. Generate it with /release STEP 1.7."
            exit 1
          fi
          echo "🔎 Play Store listing preflight · $DIR"; echo ""
          FAIL=0
          clen() { if [ -f "$1" ]; then printf '%s' "$(cat "$1")" | wc -m | tr -d ' '; else echo 0; fi; }
          check() {
            local file="$DIR/$1" max="$2" label="$3" sev="${4:-hard}" len
            if [ ! -f "$file" ]; then [ "$sev" = hard ] && { echo "❌ $label — MISSING ($1)"; FAIL=1; } || echo "⚠️  $label — missing ($1); generated at deploy"; return; fi
            len=$(clen "$file")
            if [ "$len" -eq 0 ]; then [ "$sev" = hard ] && { echo "❌ $label — EMPTY ($1)"; FAIL=1; } || echo "⚠️  $label — empty ($1); generated at deploy"; return; fi
            if [ "$len" -gt "$max" ]; then echo "❌ $label — $len chars > $max limit ($1)"; FAIL=1; return; fi
            echo "✅ $label — $len/$max chars"
          }
          check title.txt              30 "Title"             hard
          check short_description.txt   80 "Short description" hard
          check full_description.txt  4000 "Full description"  hard
          check changelogs/default.txt 500 "Changelog"         soft
          echo ""
          if [ "$FAIL" -ne 0 ]; then echo "❌ Store-listing preflight FAILED — fix the fields above before deploying."; exit 1; fi
          echo "✅ Store-listing preflight PASSED"

  stage-1-play-internal:
    name: Stage 1 — Play Internal (approval required)
    needs: [validate-secrets, validate-store-listing]
    # Firebase (Stage 0) is a SEPARATE workflow now — release-firebase.yaml — since the
    # 2026-06-22 split. Play and Firebase are independent channels (firebase ∥ play, epic D2),
    # so the Play ladder no longer carries a Firebase node and Stage 1 depends only on
    # validate-secrets. This keeps the Play graph clean: validate → internal → beta → prod.
    if: ${{ always() && !cancelled() && !failure() && contains(fromJSON('["internal","closed","beta","production"]'), inputs.starting_rung) }}
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    environment: android-play-internal
    env:
      SOPS_AGE_KEY:            ${{ secrets.SOPS_AGE_KEY }}
      UPLOAD_KEYSTORE_B64:     ${{ secrets.upload_keystore }}
      KEYSTORE_PASSWORD:       ${{ secrets.keystore_password }}
      KEYSTORE_ALIAS:          ${{ secrets.keystore_alias }}
      KEYSTORE_ALIAS_PASSWORD: ${{ secrets.keystore_alias_password }}
      GOOGLE_SERVICES_B64:     ${{ secrets.google_services }}
      FIREBASE_CREDS_B64:      ${{ secrets.firebase_creds }}
      PLAYSTORE_CREDS_B64:     ${{ secrets.playstore_creds }}
    steps:
      - uses: actions/checkout@v4

      - name: Pre-fastlane setup (consumer-provided, pre-materialized mode)
        if: ${{ inputs.mode == 'pre-materialized' && inputs.pre_fastlane_script != '' }}
        shell: bash
        run: ${{ inputs.pre_fastlane_script }}

      - name: Upload to Play Internal
        uses: therajanmaurya/mifos-x-actionhub-publish-android-kmp/play-store-internal@v2.0.12
        with:
          android_package_name:     ${{ inputs.android_package_name }}
          mode:                     ${{ inputs.mode }}
          fastlane_cwd:             ${{ inputs.fastlane_cwd }}
          google_services:          ${{ secrets.google_services }}
          playstore_creds:          ${{ secrets.playstore_creds }}
          keystore_file:            ${{ secrets.upload_keystore }}
          keystore_password:        ${{ secrets.keystore_password }}
          keystore_alias:           ${{ secrets.keystore_alias }}
          keystore_alias_password:  ${{ secrets.keystore_alias_password }}

  stage-1b-play-closed:
    name: Stage 1b — Promote to Closed/Alpha (approval required, no rebuild)
    needs: [stage-1-play-internal]
    # Closed testing (alpha) sits between internal and beta. Promotes the internal release to
    # the alpha track (no rebuild). Runs for closed/beta/production rungs so the ladder is
    # internal → closed → beta → production. (2026-06-22)
    if: contains(fromJSON('["closed","beta","production"]'), inputs.starting_rung) && !cancelled() && !failure()
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    environment: android-play-closed
    env:
      SOPS_AGE_KEY:            ${{ secrets.SOPS_AGE_KEY }}
      UPLOAD_KEYSTORE_B64:     ${{ secrets.upload_keystore }}
      KEYSTORE_PASSWORD:       ${{ secrets.keystore_password }}
      KEYSTORE_ALIAS:          ${{ secrets.keystore_alias }}
      KEYSTORE_ALIAS_PASSWORD: ${{ secrets.keystore_alias_password }}
      GOOGLE_SERVICES_B64:     ${{ secrets.google_services }}
      FIREBASE_CREDS_B64:      ${{ secrets.firebase_creds }}
      PLAYSTORE_CREDS_B64:     ${{ secrets.playstore_creds }}
    steps:
      - uses: actions/checkout@v4

      - name: Pre-fastlane setup (consumer-provided, pre-materialized mode)
        if: ${{ inputs.mode == 'pre-materialized' && inputs.pre_fastlane_script != '' }}
        shell: bash
        run: ${{ inputs.pre_fastlane_script }}

      - name: Promote Internal → Closed/Alpha
        uses: therajanmaurya/mifos-x-actionhub-publish-android-kmp/promote-to-closed@v2.0.20
        with:
          android_package_name: ${{ inputs.android_package_name }}
          mode:                 ${{ inputs.mode }}
          fastlane_cwd:         ${{ inputs.fastlane_cwd }}
          playstore_creds:      ${{ secrets.playstore_creds }}

  stage-2-promote-to-beta:
    name: Stage 2 — Promote to Open Beta (approval required, no rebuild)
    needs: [stage-1b-play-closed]
    if: contains(fromJSON('["beta","production"]'), inputs.starting_rung) && !cancelled() && !failure()
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    environment: android-play-beta
    env:
      SOPS_AGE_KEY:            ${{ secrets.SOPS_AGE_KEY }}
      UPLOAD_KEYSTORE_B64:     ${{ secrets.upload_keystore }}
      KEYSTORE_PASSWORD:       ${{ secrets.keystore_password }}
      KEYSTORE_ALIAS:          ${{ secrets.keystore_alias }}
      KEYSTORE_ALIAS_PASSWORD: ${{ secrets.keystore_alias_password }}
      GOOGLE_SERVICES_B64:     ${{ secrets.google_services }}
      FIREBASE_CREDS_B64:      ${{ secrets.firebase_creds }}
      PLAYSTORE_CREDS_B64:     ${{ secrets.playstore_creds }}
    steps:
      - uses: actions/checkout@v4

      - name: Pre-fastlane setup (consumer-provided, pre-materialized mode)
        if: ${{ inputs.mode == 'pre-materialized' && inputs.pre_fastlane_script != '' }}
        shell: bash
        run: ${{ inputs.pre_fastlane_script }}

      - name: Promote Internal → Beta
        uses: therajanmaurya/mifos-x-actionhub-publish-android-kmp/promote-to-beta@v2.0.12
        with:
          android_package_name: ${{ inputs.android_package_name }}
          mode:                 ${{ inputs.mode }}
          fastlane_cwd:         ${{ inputs.fastlane_cwd }}
          playstore_creds:      ${{ secrets.playstore_creds }}

  stage-3-promote-to-production:
    name: Stage 3 — Promote to Production (approval required, no rebuild)
    needs: [stage-2-promote-to-beta]
    if: inputs.starting_rung == 'production' && !cancelled() && !failure()
    runs-on: ${{ fromJSON(inputs.runner_pool) }}
    environment: android-play-production
    env:
      SOPS_AGE_KEY:            ${{ secrets.SOPS_AGE_KEY }}
      UPLOAD_KEYSTORE_B64:     ${{ secrets.upload_keystore }}
      KEYSTORE_PASSWORD:       ${{ secrets.keystore_password }}
      KEYSTORE_ALIAS:          ${{ secrets.keystore_alias }}
      KEYSTORE_ALIAS_PASSWORD: ${{ secrets.keystore_alias_password }}
      GOOGLE_SERVICES_B64:     ${{ secrets.google_services }}
      FIREBASE_CREDS_B64:      ${{ secrets.firebase_creds }}
      PLAYSTORE_CREDS_B64:     ${{ secrets.playstore_creds }}
    steps:
      - uses: actions/checkout@v4

      - name: Pre-fastlane setup (consumer-provided, pre-materialized mode)
        if: ${{ inputs.mode == 'pre-materialized' && inputs.pre_fastlane_script != '' }}
        shell: bash
        run: ${{ inputs.pre_fastlane_script }}

      - name: Promote Beta → Production (staged rollout)
        uses: therajanmaurya/mifos-x-actionhub-publish-android-kmp/promote-to-production@v2.0.12
        with:
          android_package_name: ${{ inputs.android_package_name }}
          mode:                 ${{ inputs.mode }}
          fastlane_cwd:         ${{ inputs.fastlane_cwd }}
          playstore_creds:      ${{ secrets.playstore_creds }}
          rollout:              ${{ inputs.production_rollout }}
