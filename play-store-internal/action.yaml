# Sub-action: play-store-internal — Stage 1 (Play Internal track)
# Part of openMF/mifos-x-actionhub-publish-android-kmp@v2.0.9
#
# Modes (since v2.0.9):
#   standard         — action materializes secrets, sets envs, invokes fastlane
#                      lane with explicit options (assumes root-level fastlane/
#                      Fastfile with `platform :android` block).
#   pre-materialized — caller has already materialized secrets and set env vars
#                      before this action runs. Action just CDs to `fastlane_cwd`
#                      and runs `bundle exec fastlane android <lane>` — lane
#                      reads everything from env (RULE-DEPLOYMENT-MANIFEST-001
#                      `deployment/<platform>/<target>/lane.rb` layout).
name: 'KMP Publish Android — Play Store Internal (Stage 1)'
description: 'Build AAB + upload to Google Play Internal testing track.'
author: 'Mifos Initiative'
branding:
  icon: 'upload'
  color: 'blue'

inputs:
  android_package_name:
    required: true
    description: 'Android Gradle module name'
  mode:
    required: false
    default: 'standard'
    description: "'standard' or 'pre-materialized'"
  fastlane_cwd:
    required: false
    default: '.'
    description: 'Working dir for fastlane (RULE-DEPLOYMENT-MANIFEST-001: set to `deployment`)'
  keystore_file:
    required: false
    default: ''
    description: 'Base64-encoded upload keystore. Ignored when mode=pre-materialized.'
  keystore_password:
    required: false
    default: ''
    description: 'Ignored when mode=pre-materialized.'
  keystore_alias:
    required: false
    default: ''
    description: 'Ignored when mode=pre-materialized.'
  keystore_alias_password:
    required: false
    default: ''
    description: 'Ignored when mode=pre-materialized.'
  google_services:
    required: false
    default: ''
    description: 'Base64-encoded google-services.json. Ignored when mode=pre-materialized.'
  playstore_creds:
    required: false
    default: ''
    description: 'Base64-encoded Play Store SA JSON. Ignored when mode=pre-materialized.'
  java-version:
    required: false
    default: '17'
    description: 'JDK version (default: 17)'

runs:
  using: 'composite'
  steps:
    - name: Setup Ruby
      uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f  # v1.232.0
      with:
        bundler-cache: true
        working-directory: ${{ inputs.fastlane_cwd }}

    # ─── STANDARD MODE ─────────────────────────────────────────────────────
    - name: Materialize secrets (standard mode)
      if: ${{ inputs.mode == 'standard' }}
      shell: bash
      env:
        GOOGLE_SERVICES: ${{ inputs.google_services }}
        PLAYSTORE_CREDS: ${{ inputs.playstore_creds }}
        KEYSTORE: ${{ inputs.keystore_file }}
        ANDROID_PACKAGE_NAME: ${{ inputs.android_package_name }}
      run: bash "$GITHUB_ACTION_PATH/../_shared/scripts/materialize-android-secrets.sh" --playstore

    - name: Upload to Play Internal (standard mode)
      if: ${{ inputs.mode == 'standard' }}
      shell: bash
      env:
        KEYSTORE_PASSWORD: ${{ inputs.keystore_password }}
        KEYSTORE_ALIAS: ${{ inputs.keystore_alias }}
        KEYSTORE_ALIAS_PASSWORD: ${{ inputs.keystore_alias_password }}
      run: |
        bundle exec fastlane android deployInternal \
          storeFile:upload_keystore.keystore \
          storePassword:"$KEYSTORE_PASSWORD" \
          keyAlias:"$KEYSTORE_ALIAS" \
          keyPassword:"$KEYSTORE_ALIAS_PASSWORD"

    - name: Cleanup secrets (standard mode)
      if: ${{ always() && inputs.mode == 'standard' }}
      shell: bash
      env:
        ANDROID_PACKAGE_NAME: ${{ inputs.android_package_name }}
      run: |
        rm -rf secrets
        rm -f keystores/upload_keystore.keystore
        rm -f "$ANDROID_PACKAGE_NAME/google-services.json"

    # ─── PRE-MATERIALIZED MODE ─────────────────────────────────────────────
    - name: Upload to Play Internal (pre-materialized mode)
      if: ${{ inputs.mode == 'pre-materialized' }}
      shell: bash
      working-directory: ${{ inputs.fastlane_cwd }}
      run: bundle exec fastlane android deployInternal

    # ─── ARTIFACT UPLOAD (both modes) ──────────────────────────────────────
    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: play-store-aab
        path: '**/build/outputs/bundle/**/*.aab'
