# Example consumer workflow — full Android promotion ladder with approval gates
#
# Copy this file into your consumer repo at `.github/workflows/release-android.yml`.
# Configure GHA environments in repo Settings → Environments:
#   - android-firebase       (no approval — Stage 0)
#   - android-play-internal  (1 reviewer)
#   - android-play-beta      (1 reviewer)
#   - android-play-production (2 reviewers + 30min wait timer)
#
# Required secrets (in repo Settings → Secrets):
#   GOOGLE_SERVICES, FIREBASE_CREDS, PLAYSTORE_CREDS,
#   UPLOAD_KEYSTORE_FILE, KEYSTORE_PASSWORD, KEYSTORE_ALIAS, KEYSTORE_ALIAS_PASSWORD
#
# ⭐ Notice: a SINGLE `uses:` line wires the full ladder. The orchestrator
# workflow ships in this very same repo at `.github/workflows/release.yaml`,
# atomically versioned with the composite actions it calls.
name: Release Android

on:
  workflow_dispatch:
    inputs:
      android_package_name:
        description: 'Gradle module (e.g. cmp-android)'
        required: true
        type: string
        default: 'cmp-android'
      version_tag:
        description: 'Version tag (e.g. v2026.06.15)'
        required: true
        type: string
      starting_rung:
        description: 'Resume from a specific rung'
        type: choice
        options: [firebase, internal, beta, production]
        default: firebase

jobs:
  release:
    uses: openMF/mifos-x-actionhub-publish-android-kmp/.github/workflows/release.yaml@v2.0.0
    with:
      android_package_name: ${{ inputs.android_package_name }}
      version_tag:          ${{ inputs.version_tag }}
      starting_rung:        ${{ inputs.starting_rung }}
    secrets:
      google_services:          ${{ secrets.GOOGLE_SERVICES }}
      firebase_creds:           ${{ secrets.FIREBASE_CREDS }}
      playstore_creds:          ${{ secrets.PLAYSTORE_CREDS }}
      upload_keystore:         ${{ secrets.UPLOAD_KEYSTORE_FILE }}
      keystore_password:        ${{ secrets.KEYSTORE_PASSWORD }}
      keystore_alias:           ${{ secrets.KEYSTORE_ALIAS }}
      keystore_alias_password:  ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
